{% extends 'base.html' %}
{% block title %}{{ 'Editar' if script else 'Novo' }} Script SQL{% endblock %}
{% block content %}
<div class="page-heading"><div><h1>{{ 'Editar' if script else 'Novo' }} Script SQL</h1><p>Cadastre scripts com CodeMirror e dados de segurança.</p></div></div>
<form method="post" class="card border-0 shadow-sm">
  <div class="card-body row g-3">
    <div class="col-lg-8">
      <label class="form-label">Título</label>
      <input name="titulo" class="form-control" value="{{ script.titulo if script else '' }}" required>
    </div>
    <div class="col-lg-4">
      <label class="form-label">Tipo de banco</label>
      <select name="tipo_banco" class="form-select">
        {% for tipo in tipos_banco %}<option value="{{ tipo.nome }}" {% if script and script.tipo_banco == tipo.nome %}selected{% endif %}>{{ tipo.nome }}</option>{% endfor %}
      </select>
      <input name="tipo_banco_novo" class="form-control mt-2" placeholder="Ou adicionar novo tipo">
    </div>
    <div class="col-12">
      <label class="form-label">Descrição</label>
      <textarea name="descricao" class="form-control" rows="3" required>{{ script.descricao if script else '' }}</textarea>
    </div>
    <div class="col-12">
      <label class="form-label">Código SQL</label>
      <textarea name="codigo_sql" id="codigo_sql" class="form-control code-editor" rows="14">{{ script.codigo_sql if script else '' }}</textarea>
    </div>
    <div class="col-12">
      <label class="form-label">Observações</label>
      <textarea name="observacoes" class="form-control" rows="3">{{ script.observacoes if script else '' }}</textarea>
    </div>
  </div>
  <div class="card-footer bg-body d-flex justify-content-end gap-2">
    <a href="{{ url_for('main.scripts_index') }}" class="btn btn-light border">Cancelar</a>
    <button class="btn btn-primary">Salvar</button>
  </div>
</form>
{% endblock %}
{% block scripts %}<script>window.initSqlEditor && window.initSqlEditor('codigo_sql', false);</script>{% endblock %}
