{% extends 'base.html' %}
{% block title %}Acesso ADM{% endblock %}
{% block content %}
<div class="auth-card mx-auto">
  <div class="text-center mb-4">
    <div class="auth-icon"><i class="bi bi-shield-lock"></i></div>
    <h1>Acesso ADM</h1>
    <p class="text-muted">Entre para cadastrar, editar, excluir e enviar imagens.</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input name="nome" class="form-control" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input name="senha" type="password" class="form-control" required>
    </div>
    <button class="btn btn-primary w-100">Entrar</button>
  </form>
  <div class="alert alert-info mt-3 small mb-0"></div>
</div>
{% endblock %}
